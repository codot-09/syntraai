<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntraAI | Payments</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app.css">
</head>
<body>
    <div class="app-grid"></div>
    <div class="app-aurora"></div>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="content">
            <div class="mobile-topbar">
                <button class="btn btn-secondary" id="openSidebar" type="button">Menu</button>
                <div class="workspace-pill" id="workspaceBadge">Workspace</div>
            </div>

            <header class="topbar">
                <div class="topbar-left">
                    <h1>Payments</h1>
                    <p>Track transaction history, monitor revenue quality, and keep finance operations structured.</p>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-secondary" id="exportBtn" type="button">Export CSV</button>
                    <button class="btn btn-primary" id="newPaymentBtn" type="button">Record payment</button>
                </div>
            </header>

            <div class="page-stack">
                <section class="stats-grid" id="statsGrid"></section>

                <section class="panel">
                    <div class="controls">
                        <div class="search-wrap">
                            <input class="search-field" id="searchInput" type="text" placeholder="Search by student name">
                        </div>
                        <select class="select-field" id="studentFilter" style="max-width: 260px;">
                            <option value="all">All students</option>
                        </select>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <div>
                            <div class="panel-title">Payment ledger</div>
                            <div class="panel-subtitle">Recent payment activity across enrolled students.</div>
                        </div>
                    </div>
                    <div class="table-wrap" id="paymentsTableWrap"></div>
                </section>
            </div>
        </div>
    </div>

    <div class="modal" id="paymentModal">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="paymentModalTitle">Record payment</div>
                    <div class="modal-subtitle">Attach a payment to a student and keep the finance trail up to date.</div>
                </div>
                <button class="btn btn-ghost" data-close-modal="paymentModal" type="button">Close</button>
            </div>

            <form id="paymentForm" class="form-grid">
                <input id="paymentId" type="hidden">

                <div class="field-group">
                    <label class="field-label" for="studentSelect">Student</label>
                    <select class="select-field" id="studentSelect" required>
                        <option value="">Select student</option>
                    </select>
                </div>

                <div class="field-group">
                    <label class="field-label" for="paymentAmount">Amount</label>
                    <input class="field" id="paymentAmount" type="number" min="0" placeholder="500000" required>
                </div>

                <button class="btn btn-primary btn-block" id="savePaymentBtn" type="submit">Save payment</button>
            </form>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        let workspaceContext;
        let payments = [];
        let students = [];
        let selectedPaymentStudentId = "";

        function monthStart() {
            const now = new Date();
            return new Date(now.getFullYear(), now.getMonth(), 1);
        }

        function fillFilters() {
            const filter = document.getElementById("studentFilter");
            const options = students.map((student) => `
                <option value="${student.id}">${SyntraApp.escapeHtml(student.name)}</option>
            `).join("");
            filter.innerHTML = `<option value="all">All students</option>${options}`;
        }

        function renderStudentChooser() {
            const list = document.getElementById("paymentStudentList");
            const searchTerm = document.getElementById("studentSearch").value.trim().toLowerCase();
            const filteredStudents = students.filter((s) => s.name.toLowerCase().includes(searchTerm));

            if (!filteredStudents.length) {
                list.innerHTML = `<div class="empty-state"><h3>No students match</h3><p>Check the spelling or add a student first.</p></div>`;
                return;
            }

            list.innerHTML = filteredStudents.map((student) => {
                const isSelected = selectedPaymentStudentId === student.id ? " checked" : "";
                return `
                    <label class="checkbox-card radio-style">
                        <input type="radio" name="paymentStudent" value="${student.id}" ${isSelected}>
                        <div>
                            <div class="list-title">${SyntraApp.escapeHtml(student.name)}</div>
                            <div class="list-meta">${SyntraApp.escapeHtml(student.phone || "No phone")}</div>
                        </div>
                    </label>
                `;
            }).join("");

            document.querySelectorAll("#paymentStudentList input[name='paymentStudent']").forEach((input) => {
                input.addEventListener("change", () => {
                    selectedPaymentStudentId = input.value;
                });
            });
        }

        function renderStats() {
            const totalRevenue = payments.reduce((sum, payment) => sum + Number(payment.amount || 0), 0);
            const monthlyRevenue = payments
                .filter((payment) => payment.created_at && new Date(payment.created_at) >= monthStart())
                .reduce((sum, payment) => sum + Number(payment.amount || 0), 0);

            document.getElementById("statsGrid").innerHTML = [
                SyntraApp.statCard("Total revenue", SyntraApp.formatMoney(totalRevenue), `${payments.length} transactions`),
                SyntraApp.statCard("Revenue this month", SyntraApp.formatMoney(monthlyRevenue), "Current month"),
                SyntraApp.statCard("Cash payments", SyntraApp.formatMoney(payments.filter(p => p.payment_method === 'cash').reduce((s, p) => s + Number(p.amount), 0)), "Total via cash"),
                SyntraApp.statCard("Card payments", SyntraApp.formatMoney(payments.filter(p => p.payment_method === 'card').reduce((s, p) => s + Number(p.amount), 0)), "Total via card")
            ].join("");
        }

        function filteredPayments() {
            const term = document.getElementById("searchInput").value.trim().toLowerCase();
            const studentFilter = document.getElementById("studentFilter").value;
            const methodFilter = document.getElementById("methodFilter").value;
            const statusFilter = document.getElementById("statusFilter").value;

            return payments.filter((payment) => {
                const studentName = payment.students?.name || "";
                const matchesSearch = studentName.toLowerCase().includes(term);
                const matchesStudent = studentFilter === "all" ? true : payment.student_id === studentFilter;
                const matchesMethod = methodFilter === "all" ? true : payment.payment_method === methodFilter;
                const matchesStatus = statusFilter === "all" ? true : payment.status === statusFilter;
                return matchesSearch && matchesStudent && matchesMethod && matchesStatus;
            });
        }

        function renderPayments() {
            const container = document.getElementById("paymentsTableWrap");
            const rows = filteredPayments();

            if (!rows.length) {
                container.innerHTML = SyntraApp.emptyState("No payments found", "Adjust filters or record a payment.");
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Student</th>
                            <th>Amount</th>
                            <th>Method</th>
                            <th>Status</th>
                            <th>Date</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${rows.map((payment) => `
                            <tr>
                                <td class="cell-primary">${SyntraApp.escapeHtml(payment.students?.name || "Unknown")}</td>
                                <td class="value-positive">${SyntraApp.formatMoney(payment.amount || 0)}</td>
                                <td><span class="badge">${SyntraApp.escapeHtml(payment.payment_method || "—")}</span></td>
                                <td><span class="badge ${payment.status === 'full paid' ? 'badge-success' : 'badge-warning'}">${SyntraApp.escapeHtml(payment.status || "—")}</span></td>
                                <td>${SyntraApp.formatDate(payment.created_at)}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn btn-secondary" type="button" onclick="editPayment('${payment.id}')">Edit</button>
                                        <button class="btn btn-danger" type="button" onclick="deletePayment('${payment.id}')">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        function resetForm() {
            document.getElementById("paymentForm").reset();
            document.getElementById("paymentId").value = "";
            document.getElementById("studentSearch").value = "";
            selectedPaymentStudentId = "";
            document.getElementById("paymentModalTitle").textContent = "Record payment";
            renderStudentChooser();
        }

        async function refreshData() {
            const [paymentsRes, studentsRes] = await Promise.all([
                SyntraApp.sb.from("payments").select("*, students(name)").eq("workspace_id", workspaceContext.workspace.id).order("created_at", { ascending: false }),
                SyntraApp.sb.from("students").select("id, name, phone").eq("workspace_id", workspaceContext.workspace.id).order("name", { ascending: true })
            ]);

            payments = paymentsRes.data || [];
            students = studentsRes.data || [];
            fillFilters();
            renderStats();
            renderPayments();
        }

        window.editPayment = function editPayment(id) {
            const payment = payments.find((item) => item.id === id);
            if (!payment) return;

            document.getElementById("paymentId").value = payment.id;
            document.getElementById("paymentAmount").value = payment.amount || "";
            document.getElementById("paymentMethod").value = payment.payment_method || "cash";
            document.getElementById("paymentStatus").value = payment.status || "full paid";
            selectedPaymentStudentId = payment.student_id || "";
            document.getElementById("studentSearch").value = "";
            document.getElementById("paymentModalTitle").textContent = "Edit payment";
            renderStudentChooser();
            SyntraApp.openModal("paymentModal");
        };

        window.deletePayment = async function deletePayment(id) {
            if (!window.confirm("Delete this payment?")) return;
            await SyntraApp.sb.from("payments").delete().eq("id", id);
            refreshData();
        };

        window.addEventListener("load", async () => {
            workspaceContext = await SyntraApp.requireWorkspace("payment");
            if (!workspaceContext) return;

            const controls = document.querySelector(".controls");
            controls.innerHTML += `
                <select class="select-field" id="methodFilter" style="max-width: 150px;">
                    <option value="all">All methods</option>
                    <option value="cash">Cash</option>
                    <option value="card">Card</option>
                </select>
                <select class="select-field" id="statusFilter" style="max-width: 150px;">
                    <option value="all">All statuses</option>
                    <option value="full paid">Full paid</option>
                    <option value="partial">Partial</option>
                </select>
            `;

            const form = document.getElementById("paymentForm");
            form.innerHTML = `
                <input id="paymentId" type="hidden">
                <div class="field-group">
                    <label class="field-label" for="studentSearch">Search student</label>
                    <input class="field" id="studentSearch" type="search" placeholder="Type student name...">
                </div>
                <div id="paymentStudentList" class="multi-checkbox-grid" style="max-height: 150px; overflow-y: auto; margin-bottom: 1rem;"></div>
                <div class="form-grid two">
                    <div class="field-group">
                        <label class="field-label" for="paymentAmount">Amount</label>
                        <input class="field" id="paymentAmount" type="number" required>
                    </div>
                    <div class="field-group">
                        <label class="field-label" for="paymentMethod">Method</label>
                        <select class="select-field" id="paymentMethod">
                            <option value="cash">Cash</option>
                            <option value="card">Card</option>
                        </select>
                    </div>
                </div>
                <div class="field-group">
                    <label class="field-label" for="paymentStatus">Status</label>
                    <select class="select-field" id="paymentStatus">
                        <option value="full paid">Full paid</option>
                        <option value="partial">Partial</option>
                    </select>
                </div>
                <button class="btn btn-primary btn-block" id="savePaymentBtn" type="submit">Save payment</button>
            `;

            document.getElementById("newPaymentBtn").addEventListener("click", resetForm);
            document.getElementById("searchInput").addEventListener("input", renderPayments);
            document.getElementById("studentFilter").addEventListener("change", renderPayments);
            document.getElementById("methodFilter").addEventListener("change", renderPayments);
            document.getElementById("statusFilter").addEventListener("change", renderPayments);
            document.getElementById("studentSearch").addEventListener("input", renderStudentChooser);

            document.getElementById("paymentForm").addEventListener("submit", async (event) => {
                event.preventDefault();
                if (!selectedPaymentStudentId) return SyntraApp.showToast("Select student", "Required", "error");

                const id = document.getElementById("paymentId").value;
                const payload = {
                    student_id: selectedPaymentStudentId,
                    amount: Number(document.getElementById("paymentAmount").value),
                    payment_method: document.getElementById("paymentMethod").value,
                    status: document.getElementById("paymentStatus").value,
                    workspace_id: workspaceContext.workspace.id
                };

                const { error } = id 
                    ? await SyntraApp.sb.from("payments").update(payload).eq("id", id)
                    : await SyntraApp.sb.from("payments").insert([payload]);

                if (!error) {
                    SyntraApp.closeModal("paymentModal");
                    refreshData();
                }
            });

            refreshData();
        });
    </script>
</body>
</html>
