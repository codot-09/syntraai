<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntraAI | Arizalar</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #030303; --card: #0a0a0a; --border: #1f1f1f; --accent: #4f46e5; --muted: #a1a1aa; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; min-height: 100vh; overflow: hidden; }
        .bg-grid { position: fixed; inset: 0; z-index: -1; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; opacity: 0.2; }
        aside { width: 260px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 32px 20px; }
        .logo { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 22px; color: #fff; text-decoration: none; margin-bottom: 40px; }
        .logo img { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--accent); }
        .nav-link { display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--muted); text-decoration: none; border-radius: 12px; font-size: 14px; font-weight: 600; margin-bottom: 4px; transition: 0.2s; }
        .nav-link:hover, .nav-link.active { background: rgba(79, 70, 229, 0.08); color: #fff; }
        main { flex: 1; overflow-y: auto; padding: 40px 50px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        .bento-table { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 24px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #444; font-size: 11px; text-transform: uppercase; padding: 15px; border-bottom: 1px solid var(--border); }
        td { padding: 18px 15px; font-size: 14px; border-bottom: 1px solid #0f0f0f; color: var(--muted); }
        .app-text { color: #fff; line-height: 1.5; max-width: 400px; }
        .badge { background: rgba(79, 70, 229, 0.1); color: var(--accent); padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 700; }
        .btn-del { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 12px; font-weight: 600; opacity: 0.6; transition: 0.2s; }
        .btn-del:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <aside>
        <a href="#" class="logo"><img src="/assets/syntraavatar.png"> Syntra<span>AI</span></a>
        <nav style="flex:1">
            <a href="dashboard.html" class="nav-link" id="linkDash">Dashboard</a>
            <a href="groups.html" class="nav-link" id="linkGroups">Guruhlar</a>
            <a href="students.html" class="nav-link" id="linkStudents">Studentlar</a>
            <a href="#" class="nav-link active">Arizalar</a>
        </nav>
    </aside>

    <main>
        <header>
            <h1>Arizalar</h1>
            <div id="countBadge" class="badge">0 ta ariza</div>
        </header>

        <div class="bento-table">
            <table>
                <thead>
                    <tr>
                        <th>Sana</th>
                        <th>Telefon</th>
                        <th>Ariza matni</th>
                        <th>Amal</th>
                    </tr>
                </thead>
                <tbody id="appTable"></tbody>
            </table>
        </div>
    </main>

    <script>
        const supabaseUrl = 'https://awbhbetmkofxpnsboien.supabase.co';
        const supabaseKey = 'sb_publishable_g8cHXb2qE1WOsiBy3YQvdg_zwaNBYMG';
        const sb = supabase.createClient(supabaseUrl, supabaseKey);
        const wsSlug = new URLSearchParams(window.location.search).get('ws');
        let currentWsId = null;

        document.getElementById('linkDash').href = `dashboard.html?ws=${wsSlug}`;
        document.getElementById('linkGroups').href = `groups.html?ws=${wsSlug}`;
        document.getElementById('linkStudents').href = `students.html?ws=${wsSlug}`;

        async function init() {
            const { data: { session } } = await sb.auth.getSession();
            if (!session) return window.location.href = 'index.html';

            const { data: ws } = await sb.from('workspaces').select('id').eq('slug', wsSlug).single();
            if (ws) {
                currentWsId = ws.id;
                loadApplications();
            }
        }

        async function loadApplications() {
            const { data: apps } = await sb.from('workspace_applications')
                .select('id, created_at, phone, application')
                .eq('workspace_id', currentWsId)
                .order('created_at', { ascending: false });

            const tbody = document.getElementById('appTable');
            tbody.innerHTML = '';
            document.getElementById('countBadge').innerText = `${apps?.length || 0} ta ariza`;

            apps?.forEach(a => {
                const date = new Date(a.created_at).toLocaleString('uz-UZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
                tbody.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td style="color:#fff; font-weight:600">${a.phone}</td>
                        <td class="app-text">${a.application}</td>
                        <td><button class="btn-del" onclick="deleteApp('${a.id}')">O'chirish</button></td>
                    </tr>
                `;
            });
        }

        async function deleteApp(id) {
            if (confirm('Arizani o\'chirmoqchimisiz?')) {
                const { error } = await sb.from('workspace_applications').delete().eq('id', id);
                if (!error) loadApplications();
            }
        }

        init();
    </script>
</body>
</html>
