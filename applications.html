<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyntraAI | Applications</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/app.css">
</head>
<body>
    <div class="app-grid"></div>
    <div class="app-aurora"></div>

    <div class="app-shell">
        <aside class="sidebar" id="sidebar"></aside>

        <div class="content">
            <div class="mobile-topbar">
                <button class="btn btn-secondary" id="openSidebar" type="button">Menu</button>
                <div class="workspace-pill" id="workspaceBadge">Workspace</div>
            </div>

            <header class="topbar">
                <div class="topbar-left">
                    <h1>Applications</h1>
                    <p>Manage and track all incoming student applications and inquiries.</p>
                </div>
                <div class="topbar-actions">
                    <button class="btn btn-secondary" id="exportBtn" type="button">Export CSV</button>
                    <button class="btn btn-primary" id="newAppBtn" type="button">New application</button>
                </div>
            </header>

            <div class="page-stack">
                <section class="stats-grid" id="statsGrid"></section>

                <section class="panel">
                    <div class="controls">
                        <div class="search-wrap">
                            <input class="search-field" id="searchInput" type="text" placeholder="Search by phone or application text">
                        </div>
                    </div>
                </section>

                <section class="panel">
                    <div class="panel-header">
                        <div>
                            <div class="panel-title">Application pipeline</div>
                            <div class="panel-subtitle">Track all incoming applications and inquiries.</div>
                        </div>
                    </div>
                    <div class="table-wrap" id="appsTableWrap"></div>
                </section>
            </div>
        </div>
    </div>

    <div class="modal" id="appModal">
        <div class="modal-card">
            <div class="modal-header">
                <div>
                    <div class="modal-title" id="appModalTitle">New application</div>
                    <div class="modal-subtitle">Submit student application with phone and message.</div>
                </div>
                <button class="btn btn-ghost" data-close-modal="appModal" type="button">Close</button>
            </div>

            <form id="appForm" class="form-grid">
                <input id="appId" type="hidden">

                <div class="field-group">
                    <label class="field-label" for="appPhone">Phone</label>
                    <input class="field" id="appPhone" type="tel" placeholder="+998 90 123 45 67" required>
                </div>

                <div class="field-group">
                    <label class="field-label" for="appMessage">Application message</label>
                    <textarea class="field" id="appMessage" placeholder="Application text or inquiry" style="min-height: 120px; resize: vertical;" required></textarea>
                </div>

                <button class="btn btn-primary btn-block" id="saveAppBtn" type="submit">Save application</button>
            </form>
        </div>
    </div>

    <script src="assets/app.js"></script>
    <script>
        let workspaceContext;
        let allApplications = [];
        let editingApp = null;

        function renderStats() {
            const totalApps = allApplications.length;
            const recentApps = allApplications.filter((app) => {
                const createdDate = new Date(app.created_at);
                const sevenDaysAgo = new Date();
                sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
                return createdDate >= sevenDaysAgo;
            }).length;

            document.getElementById("statsGrid").innerHTML = [
                SyntraApp.statCard("Total applications", String(totalApps), "All-time submissions"),
                SyntraApp.statCard("Recent", String(recentApps), "Last 7 days"),
                SyntraApp.statCard("Average", totalApps > 0 ? Math.round(totalApps / (new Date().getDate())) : "0", "Per day this month")
            ].join("");
        }

        function filteredApplications() {
            const term = document.getElementById("searchInput").value.trim().toLowerCase();

            return allApplications.filter((app) => {
                const haystack = `${app.phone || ""} ${app.application || ""}`.toLowerCase();
                return haystack.includes(term);
            });
        }

        function renderApplications() {
            const container = document.getElementById("appsTableWrap");
            const apps = filteredApplications();

            if (!apps.length) {
                container.innerHTML = SyntraApp.emptyState("No applications found", "Try another search or create a new application.");
                return;
            }

            container.innerHTML = `
                <table>
                    <thead>
                        <tr>
                            <th>Phone</th>
                            <th>Application</th>
                            <th>Submitted</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${apps.map((app) => `
                            <tr>
                                <td class="cell-primary">${SyntraApp.escapeHtml(app.phone || "")}</td>
                                <td>${SyntraApp.escapeHtml((app.application || "").substring(0, 100))}${(app.application || "").length > 100 ? "..." : ""}</td>
                                <td>${SyntraApp.escapeHtml(SyntraApp.formatDate(app.created_at))}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn btn-secondary" type="button" onclick="editApp('${app.id}')">View</button>
                                        <button class="btn btn-danger" type="button" onclick="deleteApp('${app.id}')">Delete</button>
                                    </div>
                                </td>
                            </tr>
                        `).join("")}
                    </tbody>
                </table>
            `;
        }

        async function refreshData() {
            const appsRes = await SyntraApp.sb.from("workspace_applications")
                .select("*")
                .eq("workspace_id", workspaceContext.workspace.id)
                .order("created_at", { ascending: false });

            allApplications = appsRes.data || [];
            renderStats();
            renderApplications();
        }

        window.editApp = function editApp(id) {
            editingApp = allApplications.find((item) => item.id === id) || null;
            if (!editingApp) return;

            document.getElementById("appId").value = editingApp.id;
            document.getElementById("appPhone").value = editingApp.phone || "";
            document.getElementById("appMessage").value = editingApp.application || "";
            document.getElementById("appModalTitle").textContent = "View application";
            SyntraApp.openModal("appModal");
        };

        window.deleteApp = async function deleteApp(id) {
            if (!window.confirm("Delete this application?")) return;
            
            const { error } = await SyntraApp.sb.from("workspace_applications").delete().eq("id", id);
            if (error) {
                SyntraApp.showToast("Delete failed", SyntraApp.parseError(error), "error");
                return;
            }
            
            SyntraApp.showToast("Application deleted", "The application has been removed.");
            refreshData();
        };

        window.addEventListener("load", async () => {
            workspaceContext = await SyntraApp.requireWorkspace("applications");
            if (!workspaceContext) return;

            document.getElementById("newAppBtn").addEventListener("click", () => {
                editingApp = null;
                document.getElementById("appForm").reset();
                document.getElementById("appId").value = "";
                document.getElementById("appModalTitle").textContent = "New application";
                document.getElementById("saveAppBtn").textContent = "Save application";
                SyntraApp.openModal("appModal");
            });

            document.getElementById("searchInput").addEventListener("input", renderApplications);

            document.getElementById("exportBtn").addEventListener("click", () => {
                const headers = ["Phone", "Application", "Submitted"];
                const rows = filteredApplications().map((app) => [
                    app.phone || "",
                    app.application || "",
                    SyntraApp.formatDate(app.created_at)
                ]);
                SyntraApp.exportCsv("applications.csv", headers, rows);
            });

            document.getElementById("appForm").addEventListener("submit", async (event) => {
                event.preventDefault();
                const saveBtn = document.getElementById("saveAppBtn");
                SyntraApp.setButtonLoading(saveBtn, true, "Saving...");

                const id = document.getElementById("appId").value;
                const phone = document.getElementById("appPhone").value.trim();
                const application = document.getElementById("appMessage").value.trim();

                const payload = {
                    phone,
                    application,
                    workspace_id: workspaceContext.workspace.id
                };

                const { error } = id 
                    ? await SyntraApp.sb.from("workspace_applications").update(payload).eq("id", id)
                    : await SyntraApp.sb.from("workspace_applications").insert([payload]);

                if (error) {
                    SyntraApp.showToast("Save failed", SyntraApp.parseError(error), "error");
                    SyntraApp.setButtonLoading(saveBtn, false);
                    return;
                }

                SyntraApp.showToast(id ? "Application updated" : "Application submitted", "Application saved successfully.");
                SyntraApp.closeModal("appModal");
                SyntraApp.setButtonLoading(saveBtn, false);
                refreshData();
            });

            refreshData();
        });
    </script>
</body>
</html>
